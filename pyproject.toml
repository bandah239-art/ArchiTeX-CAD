[tool.ruff]
line-length = 120
target-version = "py311"
src = ["python"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line too long — handled by formatter
    "F401",   # unused import — many star-style re-exports
    "W503",   # line break before binary operator
]

[tool.ruff.lint.per-file-ignores]
"python/main.py" = ["E302", "E303"]   # god file has historical spacing; fix incrementally
"python/tests/*" = ["E501", "F811"]

[tool.pytest.ini_options]
testpaths = ["python/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--tb=short -q"

[tool.coverage.run]
source = ["python/calculations"]
omit = ["*/tests/*", "*/migrations/*"]

[tool.coverage.report]
show_missing = true
fail_under = 40
